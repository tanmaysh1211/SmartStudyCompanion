<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Quiz — Smart Study Companion</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/quiz.css" />
</head>

<body>

    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <main class="main quiz-main">

        <!-- Loading Overlay (while AI generates questions) -->
        <div id="quiz-loading" class="ai-loading-overlay" style="display:none;">
            <div class="ai-loading-card">
                <div class="ai-spinner"></div>
                <p class="ai-loading-text">Generating quiz with AI…</p>
                <p class="ai-loading-sub">This usually takes 5–10 seconds</p>
            </div>
        </div>

        <!-- Error Banner -->
        <div id="quiz-error" class="alert alert-error" style="display:none;"></div>

        <!-- ── SCREEN 1: Start ────────────────────────────────────────────── -->
        <div id="quiz-start-screen" class="quiz-screen">
            <div class="card quiz-card">

                <h1 class="quiz-card-title">AI Generated Quiz</h1>
                <p class="quiz-card-sub">Test your knowledge based on uploaded content!</p>

                <div class="quiz-meta-row">
                    <span class="quiz-meta-badge">🏷️ <span id="quiz-note-name">Loading note…</span></span>
                    <span class="quiz-meta-badge">⏱️ Questions: <span id="quiz-question-count">10</span></span>
                </div>

                <!-- Settings -->
                <div class="quiz-settings">
                    <div class="quiz-setting-row">
                        <label class="form-label" for="quiz-count">Number of Questions</label>
                        <select class="input select-input" id="quiz-count">
                            <option value="5">5 questions</option>
                            <option value="10" selected>10 questions</option>
                            <option value="15">15 questions</option>
                            <option value="20">20 questions</option>
                        </select>
                    </div>
                    <div class="quiz-setting-row">
                        <label class="form-label" for="quiz-time-select">Time per Question</label>
                        <select class="input select-input" id="quiz-time-select">
                            <option value="30">30 seconds</option>
                            <option value="60" selected>1 minute</option>
                            <option value="120">2 minutes</option>
                            <option value="0">No limit</option>
                        </select>
                    </div>
                </div>

                <div class="quiz-start-actions">
                    <button class="btn-primary btn-lg" id="generate-quiz-btn">✨ Generate Quiz</button>
                    <button class="btn-primary btn-lg" id="start-quiz-btn" disabled>▶ Start Quiz</button>
                    <button class="btn-secondary btn-lg" id="regen-quiz-btn">↺ Regenerate</button>
                </div>

                <p class="quiz-back-link">
                    <a href="#" onclick="window.history.back(); return false;">← Back to Note</a>
                </p>
            </div>
        </div><!-- /quiz-start-screen -->

        <!-- ── SCREEN 2: Question ─────────────────────────────────────────── -->
        <div id="quiz-question-screen" class="quiz-screen" style="display:none;">
            <div class="card quiz-card">

                <!-- Progress Bar -->
                <div class="question-progress">
                    <div class="question-progress-bar" id="quiz-progress-bar" style="width:0%"></div>
                </div>

                <!-- Meta Row -->
                <div class="question-meta-row">
                    <span class="question-counter" id="quiz-counter">Question 1 of 10</span>
                    <span class="question-timer" id="quiz-timer">⏱ 60s</span>
                </div>

                <!-- Score Badge -->
                <div class="score-live">
                    Score: <strong id="quiz-live-score">0</strong>
                </div>

                <!-- Question Text -->
                <p class="question-text" id="quiz-question-text">Loading question…</p>

                <!-- Options -->
                <div class="options-list" id="quiz-options">
                    <!-- Populated by quiz.js → renderQuestion() -->
                </div>

            </div>
        </div><!-- /quiz-question-screen -->

        <!-- ── SCREEN 3: Result ───────────────────────────────────────────── -->
        <div id="quiz-result-screen" class="quiz-screen" style="display:none;">
            <div class="card quiz-card result-card">

                <div class="result-emoji" id="result-emoji">🎉</div>

                <div class="result-score-circle">
                    <div class="result-score-num" id="result-score">0/10</div>
                    <div class="result-score-pct" id="result-percent">0%</div>
                </div>

                <h2 class="result-message" id="result-message">Well done!</h2>

                <div class="result-breakdown" id="result-breakdown">
                    <!-- Optionally populated with per-question breakdown -->
                </div>

                <div class="result-actions">
                    <button class="btn-primary btn-lg" id="try-again-btn">↺ Try Again</button>
                    <button class="btn-secondary btn-lg" id="back-to-note-btn">← Back to Note</button>
                    <a class="btn-secondary btn-lg" href="report.html">📊 View Report</a>
                </div>

            </div>
        </div><!-- /quiz-result-screen -->

    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/upload.js"></script>
    <script src="../js/summary.js"></script>
    <!-- <script src="../js/quiz.js"></script> -->
    <script src="../js/quiz.js?v=2"></script>
    <script src="../js/chat.js"></script>
    <script src="../js/main.js"></script>

    <script>
        // Keep live score badge updated
        const origHandleAnswer = handleAnswer;
        window.handleAnswer = function (selectedIndex) {
            origHandleAnswer(selectedIndex);
            const el = document.getElementById("quiz-live-score");
            if (el) el.textContent = quizState.score;
        };
    </script>
</body>

</html>
