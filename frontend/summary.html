<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Summary — Smart Study Companion</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/summary.css" />
</head>

<body>

    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <main class="main summary-main">

        <div class="summary-wrapper card">

            <!-- Summary Header -->
            <div class="summary-header">
                <div class="summary-header-left">
                    <div class="summary-avatar" aria-hidden="true">🧠</div>
                    <div>
                        <h2 class="summary-title">AI Summary</h2>
                        <p class="summary-subtitle" id="summary-note-title">Loading note…</p>
                    </div>
                </div>
                <div class="summary-header-right">
                    <button class="btn-primary btn-sm" id="generate-summary-btn">🧠 Generate Summary</button>
                    <a class="btn-secondary btn-sm" href="#" onclick="window.history.back(); return false;">← Back</a>
                </div>
            </div>

            <!-- Loading State -->
            <div class="summary-loading" id="summary-loading" style="display: none;">
                <div class="loading-spinner"></div>
                <p class="loading-text">Analysing your notes and generating a summary…</p>
            </div>

            <!-- Error State -->
            <div class="summary-error" id="summary-error" style="display: none;"></div>

            <!-- Summary Content -->
            <div class="summary-content markdown-body" id="summary-content" style="display: none;"></div>

            <!-- Action Buttons -->
            <div class="summary-actions" id="summary-actions" style="display: none;">
                <button class="btn-secondary" id="copy-summary-btn">📋 Copy</button>
                <button class="btn-secondary" id="download-summary-btn">⬇ Download</button>
                <button class="btn-outline btn-sm" id="generate-summary-btn-2">↺ Regenerate</button>
            </div>

            <!-- Keyword Search -->
            <div class="summary-search-bar" id="summary-search-bar" style="display: none;">
                <input type="text" id="summary-search" class="summary-search-input"
                    placeholder="🔍 Highlight a keyword…" aria-label="Search summary keywords" />
            </div>

        </div>

        <div class="summary-notice">
            <span class="notice-icon">ℹ️</span>
            Summaries are generated <strong>only</strong> from your uploaded note content.
        </div>

    </main>

    <!-- marked.js for markdown rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

    <!-- MathJax for LaTeX rendering -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)']],
                displayMath: [['\\[', '\\]']],
                processEscapes: true,
                packages: { '[+]': ['ams'] }
            },
            svg: { fontCache: 'global' },
            startup: { typeset: false },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <script src="js/auth.js"></script>
    <script src="js/upload.js"></script>
    <script src="js/summary.js"></script>
    <script src="js/main.js"></script>

</body>

</html>
